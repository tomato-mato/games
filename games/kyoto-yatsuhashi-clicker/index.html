<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>京都みやげコレクター - 放置ゲーム</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">

  <header id="header">
    <h1>🍡 京都みやげコレクター</h1>
    <div id="score-panel">
      <div class="score-value"><span id="score">0</span> <small>pt</small></div>
      <div class="score-sub">自動収集 毎秒 +<span id="pps">0</span> pt</div>
    </div>
  </header>

  <main id="screens">

  <section id="screen-map" class="screen active">
    <nav id="map-switcher"><!-- JSで生成 --></nav>
    <div id="map-stack"><!-- JSでマップごとの背景・ランドマーク・アイテムを生成 --></div>
  </section>

  <section id="screen-shop" class="screen">
    <div class="screen-inner">
      <h2 class="screen-title">🛍️ ショップ</h2>
      <div class="shop-grid">
        <button class="upgrade-btn" id="buy-click">
          <div class="upgrade-name">✋ 集める力</div>
          <div class="upgrade-desc">タップで得るポイントが増える</div>
          <div class="upgrade-row">
            <span class="upgrade-level">Lv.<span id="click-level">1</span></span>
            <span class="upgrade-cost"><span id="click-cost">10</span> pt</span>
          </div>
        </button>
        <button class="upgrade-btn" id="buy-auto">
          <div class="upgrade-name">🧑‍🍳 自動収集人</div>
          <div class="upgrade-desc">毎秒自動でポイント獲得</div>
          <div class="upgrade-row">
            <span class="upgrade-level">Lv.<span id="auto-level">0</span></span>
            <span class="upgrade-cost"><span id="auto-cost">25</span> pt</span>
          </div>
        </button>
        <button class="upgrade-btn" id="buy-spawn">
          <div class="upgrade-name">⚡ 出現スピード</div>
          <div class="upgrade-desc">おみやげが出てくる間隔が短縮</div>
          <div class="upgrade-row">
            <span class="upgrade-level">Lv.<span id="spawn-level">1</span></span>
            <span class="upgrade-cost"><span id="spawn-cost">30</span> pt</span>
          </div>
        </button>
        <button class="upgrade-btn" id="buy-ticket">
          <div class="upgrade-name">🎫 ガチャチケット交換</div>
          <div class="upgrade-desc">ポイントをガチャチケットに交換する</div>
          <div class="upgrade-row">
            <span class="upgrade-level">所持 <span id="ticket-count">0</span>枚</span>
            <span class="upgrade-cost">2000 pt</span>
          </div>
        </button>
      </div>
    </div>
  </section>

  <section id="screen-gacha" class="screen">
    <div class="screen-inner">
      <h2 class="screen-title">🎰 ガチャ</h2>
      <div id="gacha-ticket-display">🎫 所持チケット: <span id="gacha-ticket-count">0</span>枚</div>
      <div id="gacha-top">
        <button id="gacha-pull-btn">
          🎰 ガチャを回す <span class="gacha-cost"><span id="gacha-cost">1</span>枚</span>
        </button>
        <button id="gacha-multi-btn">
          🎉 10連ガチャ <span class="gacha-cost"><span id="gacha-multi-cost">10</span>枚</span>
        </button>
      </div>
      <div id="gacha-collection" class="gacha-grid"><!-- JSで生成 --></div>
    </div>
  </section>

  <section id="screen-minigame" class="screen">
    <div class="screen-inner">
      <div id="minigame-menu">
        <h2 class="screen-title">🎮 ミニゲーム</h2>
        <div id="minigame-list"><!-- JSで生成 --></div>
      </div>
    </div>
  </section>

  <div id="minigame-kyotoquiz" class="minigame-view quiz-fullscreen hidden">
    <div class="quiz-fullscreen-inner">
      <h2 class="screen-title quiz-fullscreen-title">🗾 京都地名クイズ</h2>

      <div class="quiz-fullscreen-body">
        <div id="quiz-start">
          <div class="quiz-start-title">🗾 京都地名クイズ</div>
          <div class="quiz-start-desc">漢字の読み方をあてよう！<br>1問15秒、全<span id="quiz-start-total">10</span>問</div>
          <div id="quiz-start-banner" class="quiz-start-banner">スタート！</div>
        </div>

        <div id="quiz-area" class="hidden">
          <div id="quiz-progress">
            <span>Q <span id="quiz-index">1</span> / <span id="quiz-total">10</span></span>
            <span id="quiz-timer-wrap">⏱ <span id="quiz-timer">15</span></span>
          </div>
          <div id="quiz-kanji"></div>
          <div id="quiz-choices"><!-- JSで生成 --></div>
        </div>
        <div id="quiz-result" class="hidden">
          <div class="quiz-result-emoji">🎉</div>
          <p id="quiz-result-text"></p>
          <p id="quiz-result-best"></p>
          <button id="quiz-retry-btn">もう一度挑戦する</button>
        </div>
      </div>

      <button class="minigame-back-btn minigame-back-btn-bottom" data-minigame-back>← ミニゲーム一覧へ</button>
    </div>
  </div>

  <div id="minigame-oddoneout" class="minigame-view quiz-fullscreen hidden">
    <div class="quiz-fullscreen-inner">
      <h2 class="screen-title quiz-fullscreen-title">🔍 仲間外れゲーム</h2>

      <div class="quiz-fullscreen-body">
        <div id="oddoneout-start">
          <div class="quiz-start-title">🔍 仲間外れゲーム</div>
          <div class="quiz-start-desc">京都に関わるものが3つ、関係ないものが1つ。<br>仲間外れを見つけよう！1問12秒、全<span id="oddoneout-start-total">8</span>問</div>
          <div id="oddoneout-start-banner" class="quiz-start-banner">スタート！</div>
        </div>

        <div id="oddoneout-area" class="hidden">
          <div id="oddoneout-progress">
            <span>Q <span id="oddoneout-index">1</span> / <span id="oddoneout-total">8</span></span>
            <span id="oddoneout-timer-wrap">⏱ <span id="oddoneout-timer">12</span></span>
          </div>
          <div id="oddoneout-grid"><!-- JSで生成 --></div>
          <p id="oddoneout-explanation" class="oddoneout-explanation hidden"></p>
        </div>

        <div id="oddoneout-result" class="hidden">
          <div class="quiz-result-emoji">🔍</div>
          <p id="oddoneout-result-text"></p>
          <p id="oddoneout-result-best"></p>
          <button id="oddoneout-retry-btn">もう一度挑戦する</button>
        </div>
      </div>

      <button class="minigame-back-btn minigame-back-btn-bottom" data-minigame-back>← ミニゲーム一覧へ</button>
    </div>
  </div>

  </main>

  <nav id="tab-bar">
    <button class="tab-btn active" data-screen="map"><span class="tab-icon">🗺️</span><span class="tab-label">マップ</span></button>
    <button class="tab-btn" data-screen="shop"><span class="tab-icon">🛍️</span><span class="tab-label">ショップ</span></button>
    <button class="tab-btn" data-screen="gacha"><span class="tab-icon">🎰</span><span class="tab-label">ガチャ</span></button>
    <button class="tab-btn" data-screen="minigame"><span class="tab-icon">🎮</span><span class="tab-label">ミニゲーム</span></button>
  </nav>

</div>

<div id="landmark-info" class="modal hidden">
  <div class="modal-box landmark-info-box">
    <div id="landmark-info-icon" class="landmark-info-icon"></div>
    <h2 id="landmark-info-name"></h2>
    <p id="landmark-info-desc"></p>
    <button id="landmark-info-close">OK</button>
  </div>
</div>

<div id="gacha-item-info" class="modal hidden">
  <div class="modal-box gacha-result-box" id="gacha-item-info-box">
    <div id="gacha-item-info-icon" class="gacha-result-icon"></div>
    <div id="gacha-item-info-rarity" class="gacha-result-rarity"></div>
    <h2 id="gacha-item-info-name"></h2>
    <p id="gacha-item-info-count"></p>
    <button id="gacha-item-info-close">OK</button>
  </div>
</div>

<div id="gacha-result" class="modal hidden">
  <div class="modal-box gacha-result-box" id="gacha-result-box">
    <div id="chest-phase" class="chest-phase">
      <div class="chest-scene">
        <div id="chest" class="chest">
          <div class="chest-glow"></div>
          <svg viewBox="0 0 60 60" class="chest-body-svg">
            <defs>
              <linearGradient id="cbBody" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0" stop-color="#c9975f"/><stop offset="1" stop-color="#8a5a30"/>
              </linearGradient>
            </defs>
            <rect x="8" y="26" width="44" height="26" rx="3" fill="url(#cbBody)" stroke="#5a3a1a" stroke-width="1.5"/>
            <rect x="8" y="34" width="44" height="5" fill="#e8a72a" stroke="#b9821e" stroke-width="0.8"/>
            <rect x="26" y="30" width="8" height="10" rx="2" fill="#e8a72a" stroke="#b9821e" stroke-width="1"/>
            <circle cx="30" cy="35" r="1.6" fill="#5a3a1a"/>
          </svg>
          <svg viewBox="0 0 60 60" class="chest-lid-svg">
            <defs>
              <linearGradient id="clLid" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0" stop-color="#d9aa6f"/><stop offset="1" stop-color="#9a6a3a"/>
              </linearGradient>
            </defs>
            <path d="M8 30 L8 18 Q8 8 30 8 Q52 8 52 18 L52 30 Z" fill="url(#clLid)" stroke="#5a3a1a" stroke-width="1.5"/>
            <path d="M8 22 Q30 30 52 22" fill="none" stroke="#e8a72a" stroke-width="2.5"/>
          </svg>
        </div>
      </div>
      <p class="chest-hint">タップして開ける！</p>
    </div>
    <div id="item-phase" class="item-phase hidden">
      <div id="gacha-result-icon" class="gacha-result-icon"></div>
      <div id="gacha-result-rarity" class="gacha-result-rarity"></div>
      <h2 id="gacha-result-name"></h2>
      <p id="gacha-result-sub"></p>
      <button id="gacha-result-close">OK</button>
    </div>
  </div>
</div>

<div id="gacha-multi-result" class="modal hidden">
  <div class="modal-box gacha-multi-box">
    <div id="multi-chest-phase" class="chest-phase">
      <div class="chest-scene">
        <div id="multi-chest" class="chest">
          <div class="chest-glow"></div>
          <svg viewBox="0 0 60 60" class="chest-body-svg">
            <defs>
              <linearGradient id="cbBody2" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0" stop-color="#c9975f"/><stop offset="1" stop-color="#8a5a30"/>
              </linearGradient>
            </defs>
            <rect x="8" y="26" width="44" height="26" rx="3" fill="url(#cbBody2)" stroke="#5a3a1a" stroke-width="1.5"/>
            <rect x="8" y="34" width="44" height="5" fill="#e8a72a" stroke="#b9821e" stroke-width="0.8"/>
            <rect x="26" y="30" width="8" height="10" rx="2" fill="#e8a72a" stroke="#b9821e" stroke-width="1"/>
            <circle cx="30" cy="35" r="1.6" fill="#5a3a1a"/>
          </svg>
          <svg viewBox="0 0 60 60" class="chest-lid-svg">
            <defs>
              <linearGradient id="clLid2" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0" stop-color="#d9aa6f"/><stop offset="1" stop-color="#9a6a3a"/>
              </linearGradient>
            </defs>
            <path d="M8 30 L8 18 Q8 8 30 8 Q52 8 52 18 L52 30 Z" fill="url(#clLid2)" stroke="#5a3a1a" stroke-width="1.5"/>
            <path d="M8 22 Q30 30 52 22" fill="none" stroke="#e8a72a" stroke-width="2.5"/>
          </svg>
        </div>
      </div>
      <p class="chest-hint">タップして開ける！</p>
      <button id="multi-skip-btn" class="multi-skip-btn">スキップ ▶</button>
    </div>
    <div id="multi-item-phase" class="item-phase hidden">
      <h2 class="multi-result-title">10連ガチャ結果</h2>
      <div id="multi-item-grid" class="gacha-multi-grid"><!-- JSで生成 --></div>
      <p id="multi-summary"></p>
      <button id="multi-result-close">OK</button>
    </div>
  </div>
</div>

<script src="quiz-data.js"></script>
<script src="oddoneout-data.js"></script>
<script src="script.js"></script>
</body>
</html>
