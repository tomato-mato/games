<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>魚バトル</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        html,body { overflow:hidden; width:100%; height:100%; touch-action:none; }
        body { background:#03045e; font-family:Arial,sans-serif; }
        canvas { display:block; }

        #hud {
            position:fixed; top:12px; left:0; right:0;
            display:flex; justify-content:center; gap:14px;
            pointer-events:none; z-index:10;
        }
        .hud-panel {
            background:rgba(0,0,0,0.5);
            border:1px solid rgba(255,255,255,0.15);
            border-radius:14px; padding:5px 18px;
            text-align:center; color:#fff;
        }
        .hud-label { font-size:0.72em; opacity:0.7; letter-spacing:1px; }
        .hud-val   { font-size:1.8em; font-weight:bold; line-height:1.1; }

        #start-screen {
            position:fixed; inset:0;
            background:rgba(2,10,40,0.93);
            display:flex; align-items:center; justify-content:center;
            z-index:20; color:#fff;
        }
        #start-screen.hidden { display:none; }
        .start-box { text-align:center; max-width:360px; padding:20px; }
        .start-box h1 { font-size:2.4em; margin-bottom:12px; }
        .start-box p  { font-size:0.95em; line-height:1.9; opacity:0.88; margin-bottom:24px; }
        .start-btn {
            padding:14px 44px; font-size:1.1em; font-weight:bold;
            background:#4cc9f0; color:#03045e; border:none;
            border-radius:30px; cursor:pointer; letter-spacing:2px;
        }
        .start-btn:hover { background:#72ddf7; }

        #overlay {
            position:fixed; inset:0; background:rgba(0,0,0,0);
            display:flex; align-items:center; justify-content:center;
            pointer-events:none; transition:background .4s; z-index:15;
        }
        #overlay.active { background:rgba(0,0,0,0.72); pointer-events:all; }
        #go-box {
            background:linear-gradient(135deg,#023e8a,#03045e);
            border:2px solid #4cc9f0; border-radius:22px;
            padding:36px 52px; text-align:center; color:#fff;
            transform:scale(0); transition:transform .4s cubic-bezier(.22,1,.36,1);
            box-shadow:0 0 50px rgba(76,201,240,.3);
        }
        #overlay.active #go-box { transform:scale(1); }
        #go-box h2 { font-size:2.2em; color:#f87171; margin-bottom:10px; }
        #go-box .go-scores { font-size:1.2em; line-height:2.1; margin-bottom:20px; }
        #restart-btn {
            padding:11px 34px; font-size:1em; font-weight:bold;
            background:#4cc9f0; color:#03045e; border:none;
            border-radius:25px; cursor:pointer; letter-spacing:2px;
        }
        #restart-btn:hover { background:#72ddf7; }

        @media (max-width:480px) {
            .hud-label { font-size:0.6em; }
            .hud-val   { font-size:1.4em; }
            .hud-panel { padding:4px 12px; border-radius:10px; }
            .start-box h1 { font-size:1.9em; }
            #go-box { padding:28px 30px; }
            #go-box h2 { font-size:1.7em; }
        }
    </style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="hud">
    <div class="hud-panel">
        <div class="hud-label">スコア</div>
        <div class="hud-val" id="hud-score">2</div>
    </div>
    <div class="hud-panel">
        <div class="hud-label">ハイスコア</div>
        <div class="hud-val" id="hud-hi">2</div>
    </div>
</div>

<div id="start-screen">
    <div class="start-box">
        <h1>🐟 魚バトル</h1>
        <p>
            <span style="color:#4ade80">数字が小さい魚</span>を食べると<br>その数字ぶんスコアが増えるよ！<br>
            <span style="color:#f87171">数字が大きい魚</span>には食べられてしまう！<br><br>
            🖱️ マウス追従 ／ 📱 左下ジョイスティック
        </p>
        <button class="start-btn" onclick="startGame()">スタート！</button>
    </div>
</div>

<div id="overlay">
    <div id="go-box">
        <h2>💀 食べられた！</h2>
        <div class="go-scores" id="go-scores"></div>
        <button id="restart-btn" onclick="startGame()">もう一度！</button>
    </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');

let W, H;
function resize(){
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
    resetJoyBase();
}
window.addEventListener('resize', resize);

// ── カメラ設定 ──
const CAM_SCALE = 1.5;
// プレイヤーが常に画面中心。ワールド座標 → スクリーン座標:
//   sx = W/2 + (wx - player.x) * CAM_SCALE
//   sy = H/2 + (wy - player.y) * CAM_SCALE

// ── モバイル判定 ──
const isMobile = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;

// ── ユーティリティ ──
const rng    = (a,b) => Math.random()*(b-a)+a;
const rngInt = (a,b) => Math.floor(rng(a,b+1));
const clamp  = (v,lo,hi) => Math.max(lo,Math.min(hi,v));
const dist2  = (ax,ay,bx,by) => Math.hypot(ax-bx,ay-by);
function lerpAngle(a,b,t){
    const d=((b-a)%(Math.PI*2)+Math.PI*3)%(Math.PI*2)-Math.PI;
    return a+d*t;
}

// 画面の対角半径（ワールド単位）
function visR(){ return Math.hypot(W, H) / 2 / CAM_SCALE; }

function fishSize(n){
    if(n <= 100){
        return 22 * Math.pow(1.03, Math.floor((n-1)/20));
    }
    const base100 = 22 * Math.pow(1.03, 4);
    if(n <= 1000){
        const tier = Math.floor((n-101)/100) + 1; // 1〜9
        return base100 * Math.pow(1.05, tier);
    }
    const base1000 = base100 * Math.pow(1.05, 9);
    const tier = Math.min(Math.floor((n-1001)/1000) + 1, 40);
    return Math.min(base1000 * Math.pow(1.02, tier), 120);
}

// ── サウンド ──
let _ac=null;
function getAC(){
    if(!_ac) try{ _ac=new(window.AudioContext||window.webkitAudioContext)(); }catch(e){}
    return _ac;
}
function playKirari(){
    const ac=getAC(); if(!ac) return;
    const t=ac.currentTime;
    [[2200,2900,0],[3400,4100,0.06]].forEach(([f1,f2,d])=>{
        const o=ac.createOscillator(),g=ac.createGain();
        o.connect(g); g.connect(ac.destination); o.type='sine';
        o.frequency.setValueAtTime(f1,t+d);
        o.frequency.exponentialRampToValueAtTime(f2,t+d+0.07);
        g.gain.setValueAtTime(0,t+d);
        g.gain.linearRampToValueAtTime(0.18,t+d+0.008);
        g.gain.exponentialRampToValueAtTime(0.001,t+d+0.22);
        o.start(t+d); o.stop(t+d+0.25);
    });
}
function playBomb(){
    const ac=getAC(); if(!ac) return;
    const t=ac.currentTime;
    const o=ac.createOscillator(),g=ac.createGain();
    o.connect(g); g.connect(ac.destination); o.type='sine';
    o.frequency.setValueAtTime(120,t);
    o.frequency.exponentialRampToValueAtTime(25,t+0.35);
    g.gain.setValueAtTime(0,t);
    g.gain.linearRampToValueAtTime(0.5,t+0.02);
    g.gain.exponentialRampToValueAtTime(0.001,t+0.4);
    o.start(t); o.stop(t+0.4);
    const o2=ac.createOscillator(),g2=ac.createGain();
    o2.connect(g2); g2.connect(ac.destination); o2.type='square';
    o2.frequency.setValueAtTime(80,t);
    o2.frequency.exponentialRampToValueAtTime(20,t+0.2);
    g2.gain.setValueAtTime(0,t);
    g2.gain.linearRampToValueAtTime(0.25,t+0.01);
    g2.gain.exponentialRampToValueAtTime(0.001,t+0.25);
    o2.start(t); o2.stop(t+0.3);
}
// ── 色 ──
const COL_PLAYER='#4cc9f0', COL_PLAYER_DARK='#0077b6';
function randomFishColor(){
    const h=rngInt(0,359);
    const s=rngInt(65,90);
    const l=rngInt(52,70);
    return { body:`hsl(${h},${s}%,${l}%)`, dark:`hsl(${h},${s}%,${l-28}%)` };
}

// ── 状態 ──
let player=null, npcs=[], particles=[], popups=[], bombs=[], gameActive=false;
let bombTimer=300;
let highScore=parseInt(localStorage.getItem('fishHS')||'2');
document.getElementById('hud-hi').textContent=highScore;

// ── ジョイスティック ──
const JOY_R=60, JOY_TH=26, JOY_MAX=48;
let joy={active:false,bx:0,by:0,tx:0,ty:0,dx:0,dy:0,mag:0,id:null};

function resetJoyBase(){
    joy.bx=JOY_R+18; joy.by=(H||600)-JOY_R-18;
    if(!joy.active){ joy.tx=joy.bx; joy.ty=joy.by; }
}

function updateJoy(cx,cy){
    const dx=cx-joy.bx, dy=cy-joy.by, d=Math.hypot(dx,dy);
    joy.mag=Math.min(1,d/JOY_MAX);
    if(d>0){
        joy.dx=dx/d; joy.dy=dy/d;
        joy.tx=joy.bx+joy.dx*Math.min(d,JOY_MAX);
        joy.ty=joy.by+joy.dy*Math.min(d,JOY_MAX);
    } else { joy.dx=0; joy.dy=0; joy.tx=joy.bx; joy.ty=joy.by; }
}

canvas.addEventListener('touchstart',e=>{
    e.preventDefault();
    const ac=getAC(); if(ac&&ac.state==='suspended') ac.resume();
    for(const t of e.changedTouches){
        if(joy.id===null && dist2(t.clientX,t.clientY,joy.bx,joy.by)<JOY_R*2.2){
            joy.id=t.identifier; joy.active=true;
            updateJoy(t.clientX,t.clientY);
        }
    }
},{passive:false});
canvas.addEventListener('touchmove',e=>{
    e.preventDefault();
    for(const t of e.changedTouches){
        if(t.identifier===joy.id) updateJoy(t.clientX,t.clientY);
    }
},{passive:false});
function joyRelease(e){
    for(const t of e.changedTouches){
        if(t.identifier===joy.id){
            joy.active=false; joy.id=null;
            joy.dx=0; joy.dy=0; joy.mag=0;
            joy.tx=joy.bx; joy.ty=joy.by;
        }
    }
}
canvas.addEventListener('touchend',joyRelease);
canvas.addEventListener('touchcancel',joyRelease);

// ── マウス（デスクトップ） ──
let mouseX=-9999, mouseY=-9999;
if(!isMobile){
    canvas.addEventListener('mousemove',e=>{ mouseX=e.clientX; mouseY=e.clientY; });
}

// ── NPC生成 ──
function createNPC(initSpawn){
    const pn=player?player.number:2;
    // スコア爆発防止：近傍の数字のみ生成（差は最大50）
    const spread = Math.min(Math.max(3, Math.floor(pn * 0.4)), 50);
    let n; const r=Math.random();
    if     (r<0.52) n=Math.max(1, rngInt(Math.max(1, pn - spread), pn - 1));
    else if(r<0.80) n=rngInt(pn + 1, pn + spread);
    else            n=pn;
    n=Math.max(1,n);

    const vr=visR();
    const angle=rng(0,Math.PI*2);
    // initSpawn時は画面内に、それ以外は少し外から
    const radius=initSpawn ? rng(vr*0.05, vr*0.9) : rng(vr*0.7, vr*1.6);
    const px=player?player.x:0, py=player?player.y:0;
    const x=px+Math.cos(angle)*radius;
    const y=py+Math.sin(angle)*radius;

    const ang=rng(0,Math.PI*2), spd=rng(0.4,1.2);
    const col=randomFishColor();
    return{x,y,n,alive:true,
        vx:Math.cos(ang)*spd, vy:Math.sin(ang)*spd,
        angle:ang, swimPhase:rng(0,Math.PI*2),
        size:fishSize(n), dirTimer:rng(100,280),
        color:col.body, darkColor:col.dark};
}

// ── 爆弾生成 ──
function createBomb(){
    const pn=player?player.number:2;
    const damage=Math.max(1, Math.round(pn * 0.2));
    const vr=visR();
    const angle=rng(0,Math.PI*2);
    const radius=rng(vr*0.3, vr*1.2);
    const px=player?player.x:0, py=player?player.y:0;
    return {
        x:px+Math.cos(angle)*radius,
        y:py+Math.sin(angle)*radius,
        damage, alive:true,
        size:14,
        lifetime:rng(1000,1500),
        phase:rng(0,Math.PI*2)
    };
}

function drawBomb(bx,by,size,damage,phase){
    ctx.save();
    ctx.translate(bx,by);
    const pulse=1+Math.sin(phase)*0.06;
    const r=size*pulse;
    ctx.fillStyle='#1a1a2e';
    ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.12)';
    ctx.beginPath(); ctx.arc(-r*0.28,-r*0.28,r*0.45,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='#ff8c00'; ctx.lineWidth=r*0.15;
    ctx.beginPath(); ctx.moveTo(r*0.5,-r*0.5);
    ctx.quadraticCurveTo(r*0.9,-r*1.1,r*0.5,-r*1.35); ctx.stroke();
    ctx.fillStyle='#ffff44';
    ctx.beginPath(); ctx.arc(r*0.5,-r*1.35,r*0.14,0,Math.PI*2); ctx.fill();
    ctx.restore();
    const fs=clamp(size*0.78,8,20);
    ctx.save(); ctx.translate(bx,by);
    ctx.font=`bold ${fs}px Arial`; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.strokeStyle='rgba(0,0,0,0.9)'; ctx.lineWidth=Math.max(2,fs*0.25);
    ctx.strokeText(`-${damage}`,0,0);
    ctx.fillStyle='#ff4444';
    ctx.fillText(`-${damage}`,0,0);
    ctx.restore();
}

// ── パーティクル ──
function spawnParticles(x,y,color,count){
    for(let i=0;i<count;i++){
        const a=rng(0,Math.PI*2), s=rng(1,4)/CAM_SCALE;
        particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,
            life:1,decay:rng(0.025,0.06),size:rng(3,9)/CAM_SCALE,color});
    }
}
function spawnPopup(x,y,text){
    popups.push({x,y,text,vy:-0.8/CAM_SCALE,life:1,decay:0.018});
}

// ── 魚描画（ワールド座標） ──
function drawFishBody(x,y,size,angle,bodyColor,darkColor,swimPhase){
    const wiggle=Math.sin(swimPhase*2.8)*0.26;
    const fr=Math.cos(angle)>=0;
    ctx.save(); ctx.translate(x,y);
    if(!fr) ctx.scale(-1,1);
    ctx.rotate(fr?angle:Math.PI-angle);

    ctx.fillStyle=darkColor;
    ctx.beginPath();
    ctx.moveTo(-size*0.78,0);
    ctx.lineTo(-size*1.52,-size*0.62+wiggle*size*0.9);
    ctx.lineTo(-size*1.15,0);
    ctx.lineTo(-size*1.52, size*0.62+wiggle*size*0.9);
    ctx.closePath(); ctx.fill();

    ctx.fillStyle=bodyColor;
    ctx.beginPath(); ctx.ellipse(0,0,size,size*0.57,0,0,Math.PI*2); ctx.fill();
    const g=ctx.createRadialGradient(-size*0.15,-size*0.2,size*0.08,0,0,size);
    g.addColorStop(0,'rgba(255,255,255,0.35)'); g.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=g;
    ctx.beginPath(); ctx.ellipse(0,0,size,size*0.57,0,0,Math.PI*2); ctx.fill();

    ctx.fillStyle=darkColor;
    ctx.beginPath();
    ctx.moveTo(-size*0.08,-size*0.54);
    ctx.quadraticCurveTo(size*0.22,-size*0.98,size*0.44,-size*0.54);
    ctx.closePath(); ctx.fill();

    ctx.fillStyle='white';
    ctx.beginPath(); ctx.arc(size*0.52,-size*0.1,size*0.17,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#0d1b2a';
    ctx.beginPath(); ctx.arc(size*0.55,-size*0.1,size*0.09,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='white';
    ctx.beginPath(); ctx.arc(size*0.58,-size*0.16,size*0.04,0,Math.PI*2); ctx.fill();
    ctx.restore();
}

function drawFish(x,y,size,angle,bodyColor,darkColor,number,swimPhase,isPlayer){
    if(isPlayer){
        const rg=ctx.createRadialGradient(x,y,size*0.5,x,y,size*1.6);
        rg.addColorStop(0,'rgba(76,201,240,0.22)'); rg.addColorStop(1,'rgba(76,201,240,0)');
        ctx.fillStyle=rg; ctx.beginPath(); ctx.arc(x,y,size*1.6,0,Math.PI*2); ctx.fill();
    }
    drawFishBody(x,y,size,angle,bodyColor,darkColor,swimPhase);
    const fs=clamp(size*0.68,9,24);
    ctx.save(); ctx.translate(x,y);
    ctx.font=`bold ${fs}px Arial`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.strokeStyle='rgba(0,0,0,0.82)'; ctx.lineWidth=Math.max(1.5,fs*0.22);
    ctx.strokeText(number,0,0); ctx.fillStyle='white'; ctx.fillText(number,0,0);
    ctx.restore();
}

// ── 海底の粒子（ワールド座標で固定、海を泳いでいる感覚） ──
function drawSeaDots(){
    const grid=200;
    const vr=visR();
    const px=player?player.x:0, py=player?player.y:0;
    const x0=Math.floor((px-vr*1.2)/grid)-1;
    const y0=Math.floor((py-vr*1.2)/grid)-1;
    const x1=Math.ceil( (px+vr*1.2)/grid)+1;
    const y1=Math.ceil( (py+vr*1.2)/grid)+1;
    ctx.fillStyle='rgba(255,255,255,0.07)';
    for(let gx=x0;gx<=x1;gx++){
        for(let gy=y0;gy<=y1;gy++){
            const h1=((Math.sin(gx*127.1+gy*311.7)*43758.5453)%1+1)%1;
            const h2=((Math.sin(gx*269.5+gy*183.3)*43758.5453)%1+1)%1;
            const h3=((Math.sin(gx*92.7 +gy*461.1)*43758.5453)%1+1)%1;
            const wx=gx*grid+(h1-0.5)*grid*0.8;
            const wy=gy*grid+(h2-0.5)*grid*0.8;
            const sz=1+h3*3.5;
            ctx.beginPath(); ctx.arc(wx,wy,sz,0,Math.PI*2); ctx.fill();
        }
    }
}

// ── ジョイスティック描画（スクリーン座標） ──
function drawJoystick(){
    if(!isMobile||!gameActive) return;
    const{bx,by,tx,ty,active}=joy;
    ctx.save();
    ctx.globalAlpha=active?0.5:0.22;
    ctx.beginPath(); ctx.arc(bx,by,JOY_R,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,0.08)'; ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.55)'; ctx.lineWidth=2.5; ctx.stroke();
    ctx.globalAlpha=active?0.28:0.12;
    ctx.beginPath(); ctx.arc(bx,by,JOY_MAX,0,Math.PI*2);
    ctx.strokeStyle='rgba(255,255,255,0.4)'; ctx.lineWidth=1.5; ctx.stroke();
    ctx.globalAlpha=active?0.82:0.38;
    ctx.beginPath(); ctx.arc(tx,ty,JOY_TH,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,0.7)'; ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.95)'; ctx.lineWidth=2; ctx.stroke();
    if(!active){
        ctx.globalAlpha=0.32; ctx.font='bold 11px Arial';
        ctx.fillStyle='white'; ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText('MOVE',bx,by+JOY_R+13);
    }
    ctx.restore();
}

// ── 背景グラデーション（スクリーン座標） ──
function drawBG(){
    const g=ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0,'#03045e'); g.addColorStop(0.6,'#023e8a'); g.addColorStop(1,'#0077b6');
    ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
    // 光の筋
    ctx.save(); ctx.globalAlpha=0.03; ctx.fillStyle='white';
    for(let i=0;i<6;i++){
        const lx=W*(i/6)+W*0.08;
        ctx.beginPath(); ctx.moveTo(lx,0); ctx.lineTo(lx-55,H); ctx.lineTo(lx+55,H);
        ctx.closePath(); ctx.fill();
    }
    ctx.restore();
}

// ── ゲームループ ──
let lastTime=0;
function gameLoop(ts){
    const dt=Math.min((ts-lastTime)/16.67,3);
    lastTime=ts;

    ctx.clearRect(0,0,W,H);
    drawBG();

    // ── カメラ変換（ワールド空間へ） ──
    const camX=player?player.x:0, camY=player?player.y:0;
    ctx.save();
    ctx.translate(W/2, H/2);
    ctx.scale(CAM_SCALE, CAM_SCALE);
    ctx.translate(-camX, -camY);

    // 海の粒子（背景、常に描画）
    drawSeaDots();

    if(gameActive){
        // ── プレイヤー更新 ──
        if(isMobile){
            if(joy.active && joy.mag>0.05){
                const spd=clamp(2.5+player.number*0.04,2.5,6)*joy.mag*dt;
                player.x+=joy.dx*spd;
                player.y+=joy.dy*spd;
                player.angle=Math.atan2(joy.dy,joy.dx);
            }
        } else {
            if(mouseX>-9000){
                // マウスのスクリーン座標 → ワールド座標
                const tx=camX+(mouseX-W/2)/CAM_SCALE;
                const ty=camY+(mouseY-H/2)/CAM_SCALE;
                const dx=tx-player.x, dy=ty-player.y;
                const d=Math.hypot(dx,dy);
                if(d>3){
                    const spd=clamp(2.5+player.number*0.04,2.5,6)*dt;
                    player.x+=dx/d*Math.min(spd,d);
                    player.y+=dy/d*Math.min(spd,d);
                    player.angle=Math.atan2(dy,dx);
                }
            }
        }
        player.swimPhase+=0.1*dt;

        // ── NPC更新（ランダム遊泳のみ） ──
        for(const npc of npcs){
            if(!npc.alive) continue;
            npc.dirTimer-=dt;
            if(npc.dirTimer<=0){
                const a=rng(0,Math.PI*2), s=rng(0.4,1.3);
                npc.vx=Math.cos(a)*s; npc.vy=Math.sin(a)*s;
                npc.dirTimer=rng(100,280);
            }
            const spd=Math.hypot(npc.vx,npc.vy);
            if(spd>1.4){npc.vx*=1.4/spd; npc.vy*=1.4/spd;}
            npc.x+=npc.vx*dt; npc.y+=npc.vy*dt;
            if(spd>0.05) npc.angle=lerpAngle(npc.angle,Math.atan2(npc.vy,npc.vx),0.08*dt);
            npc.swimPhase+=0.09*dt;
        }

        // 範囲外の魚を削除
        const cullR=visR()*2.2;
        npcs=npcs.filter(n=>n.alive && dist2(n.x,n.y,player.x,player.y)<cullR);

        // 魚を補充（合計25匹）
        while(npcs.length<25) npcs.push(createNPC(false));

        // 大きい魚を常に5匹以上確保
        let lc=npcs.filter(n=>n.alive&&n.n>player.number).length;
        while(lc<5){
            const a=rng(0,Math.PI*2), r=visR();
            const radius=rng(r*0.3, r*1.4);
            const npc=createNPC(false);
            npc.x=player.x+Math.cos(a)*radius;
            npc.y=player.y+Math.sin(a)*radius;
            npc.n=player.number+rngInt(1,Math.max(3,Math.ceil(player.number*0.5)));
            npc.size=fishSize(npc.n);
            npcs.push(npc); lc++;
        }

        // ── 衝突判定 ──
        let died=false;
        for(const npc of npcs){
            if(!npc.alive) continue;
            const d=dist2(player.x,player.y,npc.x,npc.y);
            if(d<(player.size+npc.size)*0.62){
                if(player.number>npc.n){
                    playKirari();
                    spawnParticles(npc.x,npc.y,'#4ade80',10);
                    spawnPopup(npc.x,npc.y-npc.size,`+${npc.n}`);
                    player.number+=npc.n;
                    player.size=fishSize(player.number);
                    npc.alive=false;
                    document.getElementById('hud-score').textContent=player.number;
                    if(player.number>highScore){
                        highScore=player.number;
                        document.getElementById('hud-hi').textContent=highScore;
                        localStorage.setItem('fishHS',highScore);
                    }
                } else if(player.number<npc.n){
                    spawnParticles(player.x,player.y,COL_PLAYER,22);
                    died=true; break;
                }
            }
        }
        if(died){ gameOver(); }

        // ── 爆弾スポーン＆衝突 ──
        bombTimer-=dt;
        if(bombTimer<=0 && bombs.length<3){
            bombs.push(createBomb());
            bombTimer=rng(480,780);
        }
        for(const b of bombs){
            if(!b.alive) continue;
            b.lifetime-=dt;
            b.phase+=0.04;
            if(b.lifetime<=0){ b.alive=false; continue; }
            const bd=dist2(player.x,player.y,b.x,b.y);
            if(bd<(player.size+b.size)*0.7){
                playBomb();
                spawnParticles(b.x,b.y,'#ff4444',14);
                spawnPopup(b.x,b.y-b.size*2,`-${b.damage}`);
                player.number=Math.max(1, player.number-b.damage);
                player.size=fishSize(player.number);
                b.alive=false;
                document.getElementById('hud-score').textContent=player.number;
            }
        }
        bombs=bombs.filter(b=>b.alive);
    }

    // ── ワールド座標で描画 ──
    // パーティクル
    for(const p of particles){
        p.x+=p.vx; p.y+=p.vy; p.vx*=0.93; p.vy*=0.93; p.life-=p.decay;
        if(p.life<=0) continue;
        ctx.save(); ctx.globalAlpha=p.life*0.85; ctx.fillStyle=p.color;
        ctx.beginPath(); ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2); ctx.fill();
        ctx.restore();
    }
    particles=particles.filter(p=>p.life>0);

    // NPC
    for(const npc of npcs){
        if(!npc.alive) continue;
        drawFish(npc.x,npc.y,npc.size,npc.angle,npc.color,npc.darkColor,npc.n,npc.swimPhase,false);
    }

    // 爆弾
    for(const b of bombs){
        if(!b.alive) continue;
        const fade=b.lifetime<120 ? b.lifetime/120 : 1;
        ctx.save(); ctx.globalAlpha=fade; ctx.restore();
        ctx.save(); ctx.globalAlpha=fade;
        drawBomb(b.x,b.y,b.size,b.damage,b.phase);
        ctx.restore();
    }

    // プレイヤー
    if(player){
        drawFish(player.x,player.y,player.size,player.angle,
                 COL_PLAYER,COL_PLAYER_DARK,player.number,player.swimPhase,true);
    }

    // ポップアップ
    for(const p of popups){
        p.y+=p.vy; p.life-=p.decay;
        if(p.life<=0) continue;
        ctx.save(); ctx.globalAlpha=p.life;
        ctx.font=`bold ${18/CAM_SCALE}px Arial`;
        ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.strokeStyle='rgba(0,0,0,0.8)'; ctx.lineWidth=3/CAM_SCALE;
        ctx.strokeText(p.text,p.x,p.y);
        ctx.fillStyle=p.text[0]==='-'?'#ff4444':'#ffd60a'; ctx.fillText(p.text,p.x,p.y);
        ctx.restore();
    }
    popups=popups.filter(p=>p.life>0);

    // ── カメラ変換を戻す ──
    ctx.restore();

    // ── スクリーン座標で描画 ──
    drawJoystick();

    // ループを常に継続（バグ修正：ここでのみ requestAnimationFrame を呼ぶ）
    requestAnimationFrame(gameLoop);
}

// ── ゲーム開始/終了 ──
function startGame(){
    document.getElementById('start-screen').classList.add('hidden');
    document.getElementById('overlay').classList.remove('active');
    const ac=getAC(); if(ac&&ac.state==='suspended') ac.resume();

    player={x:0, y:0, number:2, angle:0, swimPhase:0, size:fishSize(2)};
    npcs=[]; particles=[]; popups=[]; bombs=[]; bombTimer=400;
    gameActive=true;

    resetJoyBase();
    joy.active=false; joy.id=null;
    joy.dx=0; joy.dy=0; joy.mag=0;
    joy.tx=joy.bx; joy.ty=joy.by;

    // 初期魚を画面内に配置
    for(let i=0;i<25;i++) npcs.push(createNPC(true));

    mouseX=W/2+5; mouseY=H/2;
    document.getElementById('hud-score').textContent=2;
    document.getElementById('hud-hi').textContent=highScore;
}

function gameOver(){
    gameActive=false;
    document.getElementById('go-scores').innerHTML=
        `スコア：<strong>${player.number}</strong><br>ハイスコア：<strong>${highScore}</strong>`;
    document.getElementById('overlay').classList.add('active');
}

// ── 起動 ──
resize();
requestAnimationFrame(gameLoop); // ループ開始（以降は内部で継続）
</script>
