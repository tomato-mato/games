<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>ブロック崩し</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      min-height: 100dvh;
      font-family: 'Segoe UI', sans-serif;
      color: #fff;
      user-select: none;
      padding: 8px;
      overflow: hidden;
    }
    h1 {
      font-size: clamp(1.1rem, 5vw, 2rem);
      margin-bottom: 6px;
      letter-spacing: 4px;
      color: #7df9ff;
      text-shadow: 0 0 16px #7df9ff88;
    }
    #info {
      display: flex;
      gap: clamp(12px, 4vw, 40px);
      margin-bottom: 8px;
      font-size: clamp(0.8rem, 3vw, 1.1rem);
      flex-wrap: wrap;
      justify-content: center;
    }
    #info span { color: #ffd700; font-weight: bold; }
    canvas {
      border: 2px solid #7df9ff44;
      border-radius: 6px;
      box-shadow: 0 0 32px #7df9ff33;
      background: #05051a;
      display: block;
      touch-action: none;
    }
    #message {
      margin-top: 8px;
      font-size: clamp(0.9rem, 3.5vw, 1.3rem);
      min-height: 1.5rem;
      color: #ffd700;
      text-shadow: 0 0 10px #ffd70088;
      letter-spacing: 2px;
      text-align: center;
    }
    #startBtn {
      margin-top: 8px;
      padding: 10px 36px;
      font-size: clamp(0.85rem, 3vw, 1rem);
      background: transparent;
      color: #7df9ff;
      border: 2px solid #7df9ff;
      border-radius: 30px;
      cursor: pointer;
      letter-spacing: 2px;
      transition: background 0.2s, color 0.2s;
    }
    #startBtn:hover, #startBtn:active { background: #7df9ff22; }
    #hint {
      margin-top: 6px;
      font-size: clamp(0.65rem, 2.5vw, 0.85rem);
      color: #aaa;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>BLOCK BREAKER</h1>
  <div id="info">
    <div>スコア: <span id="scoreVal">0</span></div>
    <div>残機: <span id="livesVal">3</span></div>
    <div>レベル: <span id="levelVal">1</span></div>
  </div>
  <canvas id="canvas" width="560" height="520"></canvas>
  <div id="message"></div>
  <button id="startBtn">スタート</button>
  <div id="hint">← → キー / マウス / タッチで操作</div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;

    // キャンバスを画面サイズに合わせてスケーリング
    function fitCanvas() {
      const pad = 16;
      const uiH = document.querySelector('h1').offsetHeight
                + document.getElementById('info').offsetHeight
                + document.getElementById('message').offsetHeight
                + document.getElementById('startBtn').offsetHeight
                + document.getElementById('hint').offsetHeight
                + 80;
      const availW = window.innerWidth - pad;
      const availH = window.innerHeight - uiH;
      const scale = Math.min(availW / W, availH / H, 1);
      canvas.style.width  = Math.floor(W * scale) + 'px';
      canvas.style.height = Math.floor(H * scale) + 'px';
    }
    window.addEventListener('resize', fitCanvas);

    // スクリーン座標 → キャンバス座標
    function toCanvasX(clientX) {
      const rect = canvas.getBoundingClientRect();
      return (clientX - rect.left) * (W / rect.width);
    }

    const COLS = 10, ROWS = 5;
    const BW = 46, BH = 18, BGAP = 6;
    const BOFF_X = (W - (BW + BGAP) * COLS + BGAP) / 2;
    const BOFF_Y = 20;

    const BASE_PADDLE_W = 90, PADDLE_H = 12, PADDLE_Y = H - 52;
    const BALL_R = 8;

    const BLOCK_COLORS = [
      ['#ff6b6b', '#cc0000'],
      ['#ff9f43', '#cc6600'],
      ['#ffd700', '#aa8800'],
      ['#6bcb77', '#227733'],
      ['#4fc3f7', '#1155aa'],
    ];

    const ITEM_TYPES = [
      { id: 'wide', color: '#6bcb77', dark: '#1a5c2a', label: 'WIDE', desc: 'パドル拡張', duration: 480 },
      { id: 'slow', color: '#4fc3f7', dark: '#0d3d6b', label: 'SLOW', desc: 'ボール低速化', duration: 420 },
      { id: 'life', color: '#ffd700', dark: '#7a5a00', label: 'LIFE', desc: '残機+1', duration: 0 },
      { id: 'thru', color: '#ff6b6b', dark: '#6b0000', label: 'THRU', desc: '貫通ボール', duration: 360 },
    ];

    let score, lives, level, blocks, ball, paddle, dx, dy;
    let keys, running, animId;
    let items, powerups, popups;

    function currentPaddleW() {
      return powerups.wide > 0 ? 140 : BASE_PADDLE_W;
    }

    function initLevel(lvl) {
      blocks = [];
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          blocks.push({
            x: BOFF_X + c * (BW + BGAP),
            y: BOFF_Y + r * (BH + BGAP),
            alive: true,
            row: r,
            item: Math.random() < 0.12 ? ITEM_TYPES[Math.floor(Math.random() * ITEM_TYPES.length)] : null,
          });
        }
      }
      const speed = 2.5 + (lvl - 1) * 0.4;
      ball = { x: W / 2, y: PADDLE_Y - BALL_R - 2 };
      dx = speed * (Math.random() > 0.5 ? 1 : -1);
      dy = -speed;
      paddle = { x: W / 2 - BASE_PADDLE_W / 2 };
      items = [];
      powerups = { wide: 0, slow: 0, thru: 0 };
    }

    function init() {
      score = 0;
      lives = 3;
      level = 1;
      keys = {};
      running = false;
      popups = [];
      initLevel(level);
      document.getElementById('message').textContent = '';
      updateHUD();
      draw();
    }

    function updateHUD() {
      document.getElementById('scoreVal').textContent = score;
      document.getElementById('livesVal').textContent = lives;
      document.getElementById('levelVal').textContent = level;
    }

    // ── 描画 ──────────────────────────────────────────────

    function drawBlock(b) {
      const [fill, shadow] = BLOCK_COLORS[b.row];
      ctx.fillStyle = shadow;
      ctx.fillRect(b.x + 2, b.y + 2, BW, BH);
      ctx.fillStyle = fill;
      ctx.fillRect(b.x, b.y, BW, BH);
      ctx.fillStyle = 'rgba(255,255,255,0.18)';
      ctx.fillRect(b.x + 3, b.y + 3, BW - 6, 5);
      if (b.item) {
        ctx.save();
        ctx.strokeStyle = b.item.color;
        ctx.lineWidth = 2;
        ctx.shadowColor = b.item.color;
        ctx.shadowBlur = 6;
        ctx.strokeRect(b.x + 1, b.y + 1, BW - 2, BH - 2);
        ctx.restore();
        ctx.font = 'bold 8px monospace';
        ctx.fillStyle = '#fff';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(b.item.label, b.x + BW / 2, b.y + BH / 2 + 1);
      }
    }

    function drawPaddle() {
      const pw = currentPaddleW();
      const x = paddle.x, y = PADDLE_Y;
      const grad = ctx.createLinearGradient(x, y, x, y + PADDLE_H);
      if (powerups.wide > 0) {
        grad.addColorStop(0, '#a0ffb0'); grad.addColorStop(1, '#228833');
      } else {
        grad.addColorStop(0, '#a0f8ff'); grad.addColorStop(1, '#3399cc');
      }
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.roundRect(x, y, pw, PADDLE_H, 6);
      ctx.fill();
    }

    function drawBall() {
      const grad = ctx.createRadialGradient(ball.x - 2, ball.y - 2, 1, ball.x, ball.y, BALL_R);
      if (powerups.thru > 0) {
        grad.addColorStop(0, '#ffffff'); grad.addColorStop(0.4, '#ff9999'); grad.addColorStop(1, '#cc0000');
      } else {
        grad.addColorStop(0, '#ffffff'); grad.addColorStop(0.5, '#ffd700'); grad.addColorStop(1, '#ff6b00');
      }
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, BALL_R, 0, Math.PI * 2);
      ctx.fillStyle = grad;
      ctx.fill();
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, BALL_R + 4, 0, Math.PI * 2);
      ctx.fillStyle = powerups.thru > 0 ? 'rgba(255,0,0,0.12)' : 'rgba(255,180,0,0.12)';
      ctx.fill();
    }

    function drawItems() {
      ctx.save();
      ctx.font = 'bold 10px monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      for (const item of items) {
        const { type, x, y } = item;
        ctx.fillStyle = type.dark;
        ctx.beginPath();
        ctx.roundRect(x - 22, y - 10 + 2, 44, 20, 5);
        ctx.fill();
        ctx.fillStyle = type.color;
        ctx.beginPath();
        ctx.roundRect(x - 22, y - 10, 44, 20, 5);
        ctx.fill();
        ctx.fillStyle = 'rgba(255,255,255,0.25)';
        ctx.fillRect(x - 18, y - 7, 36, 4);
        ctx.fillStyle = '#fff';
        ctx.fillText(type.label, x, y + 1);
      }
      ctx.restore();
    }

    function drawPowerupBar() {
      const barDefs = [
        { key: 'wide', max: 480, color: '#6bcb77', label: 'WIDE パドル拡張' },
        { key: 'slow', max: 420, color: '#4fc3f7', label: 'SLOW 低速化' },
        { key: 'thru', max: 360, color: '#ff6b6b', label: 'THRU 貫通' },
      ];
      const active = barDefs.filter(d => powerups[d.key] > 0);
      if (active.length === 0) return;

      const barW = 150, barH = 8, gap = 14;
      const totalW = active.length * barW + (active.length - 1) * gap;
      let startX = (W - totalW) / 2;
      const y = H - 16;

      ctx.save();
      ctx.font = '9px monospace';
      ctx.textBaseline = 'bottom';
      for (const d of active) {
        const ratio = powerups[d.key] / d.max;
        ctx.fillStyle = '#1a1a2e';
        ctx.beginPath(); ctx.roundRect(startX, y, barW, barH, 3); ctx.fill();
        ctx.fillStyle = d.color;
        ctx.beginPath(); ctx.roundRect(startX, y, barW * ratio, barH, 3); ctx.fill();
        ctx.fillStyle = d.color;
        ctx.textAlign = 'left';
        ctx.fillText(d.label, startX, y - 1);
        startX += barW + gap;
      }
      ctx.restore();
    }

    function drawPopups() {
      ctx.save();
      ctx.font = 'bold 14px monospace';
      ctx.textAlign = 'center';
      for (const p of popups) {
        ctx.globalAlpha = p.life / 60;
        ctx.fillStyle = p.color;
        ctx.fillText(p.text, p.x, p.y);
      }
      ctx.globalAlpha = 1;
      ctx.restore();
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);
      ctx.strokeStyle = 'rgba(125,249,255,0.04)';
      ctx.lineWidth = 1;
      for (let i = 0; i < W; i += 40) { ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, H); ctx.stroke(); }
      for (let j = 0; j < H; j += 40) { ctx.beginPath(); ctx.moveTo(0, j); ctx.lineTo(W, j); ctx.stroke(); }

      blocks.forEach(b => { if (b.alive) drawBlock(b); });
      drawItems();
      drawPaddle();
      drawBall();
      drawPowerupBar();
      drawPopups();
    }

    // ── 更新 ──────────────────────────────────────────────

    function applyItem(type) {
      if (type.id === 'wide')      { powerups.wide = type.duration; addPopup('WIDE パドル拡張!', type.color); }
      else if (type.id === 'slow') { powerups.slow = type.duration; addPopup('SLOW ボール低速化!', type.color); }
      else if (type.id === 'life') { lives = Math.min(lives + 1, 9); updateHUD(); addPopup('LIFE 残機+1!', type.color); }
      else if (type.id === 'thru') { powerups.thru = type.duration; addPopup('THRU 貫通ボール!', type.color); }
    }

    function addPopup(text, color) {
      popups.push({ text, color, x: W / 2, y: PADDLE_Y - 30, life: 60 });
    }

    function updateItems() {
      const pw = currentPaddleW();
      for (let i = items.length - 1; i >= 0; i--) {
        const item = items[i];
        item.y += item.vy;
        if (
          item.y + 10 >= PADDLE_Y && item.y - 10 <= PADDLE_Y + PADDLE_H &&
          item.x >= paddle.x && item.x <= paddle.x + pw
        ) {
          applyItem(item.type);
          items.splice(i, 1);
        } else if (item.y - 10 > H) {
          items.splice(i, 1);
        }
      }
    }

    function updatePowerupTimers() {
      if (powerups.wide > 0) powerups.wide--;
      if (powerups.slow > 0) powerups.slow--;
      if (powerups.thru > 0) powerups.thru--;
    }

    function updatePopups() {
      for (let i = popups.length - 1; i >= 0; i--) {
        popups[i].y -= 0.5;
        popups[i].life--;
        if (popups[i].life <= 0) popups.splice(i, 1);
      }
    }

    function movePaddle() {
      const pw = currentPaddleW();
      const speed = 7;
      if (keys['ArrowLeft']  || keys['a'] || keys['A']) paddle.x -= speed;
      if (keys['ArrowRight'] || keys['d'] || keys['D']) paddle.x += speed;
      paddle.x = Math.max(0, Math.min(W - pw, paddle.x));
    }

    function update() {
      movePaddle();
      updateItems();
      updatePowerupTimers();
      updatePopups();

      const speedMult = powerups.slow > 0 ? 0.6 : 1;
      ball.x += dx * speedMult;
      ball.y += dy * speedMult;

      if (ball.x - BALL_R < 0) { ball.x = BALL_R;     dx =  Math.abs(dx); }
      if (ball.x + BALL_R > W) { ball.x = W - BALL_R; dx = -Math.abs(dx); }
      if (ball.y - BALL_R < 0) { ball.y = BALL_R;     dy =  Math.abs(dy); }

      const pw = currentPaddleW();
      if (
        ball.y + BALL_R >= PADDLE_Y &&
        ball.y + BALL_R <= PADDLE_Y + PADDLE_H + Math.abs(dy) &&
        ball.x >= paddle.x - BALL_R &&
        ball.x <= paddle.x + pw + BALL_R
      ) {
        dy = -Math.abs(dy);
        ball.y = PADDLE_Y - BALL_R;
        const rel = (ball.x - (paddle.x + pw / 2)) / (pw / 2);
        const speed = Math.sqrt(dx * dx + dy * dy);
        dx = rel * speed * 1.2;
        const minDy = speed * 0.5;
        dy = -Math.sqrt(Math.max(minDy * minDy, speed * speed - dx * dx));
      }

      let remaining = 0;
      for (const b of blocks) {
        if (!b.alive) continue;
        remaining++;
        if (
          ball.x + BALL_R > b.x && ball.x - BALL_R < b.x + BW &&
          ball.y + BALL_R > b.y && ball.y - BALL_R < b.y + BH
        ) {
          b.alive = false;
          remaining--;
          score += (ROWS - b.row) * 10;
          updateHUD();
          if (b.item) {
            items.push({ x: b.x + BW / 2, y: b.y + BH / 2, type: b.item, vy: 2.2 });
          }
          if (!powerups.thru) {
            const overlapL = (ball.x + BALL_R) - b.x;
            const overlapR = (b.x + BW) - (ball.x - BALL_R);
            const overlapT = (ball.y + BALL_R) - b.y;
            const overlapB = (b.y + BH) - (ball.y - BALL_R);
            if (Math.min(overlapL, overlapR) < Math.min(overlapT, overlapB)) dx = -dx;
            else dy = -dy;
            break;
          }
        }
      }

      if (ball.y - BALL_R > H) {
        lives--;
        updateHUD();
        if (lives <= 0) { endGame(false); return; }
        ball = { x: W / 2, y: PADDLE_Y - BALL_R - 2 };
        const speed = 2.5 + (level - 1) * 0.4;
        dx = speed * (Math.random() > 0.5 ? 1 : -1);
        dy = -speed;
        powerups = { wide: 0, slow: 0, thru: 0 };
        items = [];
      }

      if (remaining === 0) {
        level++;
        updateHUD();
        if (level > 3) { endGame(true); return; }
        initLevel(level);
      }
    }

    function endGame(win) {
      running = false;
      document.getElementById('message').textContent = win
        ? '🎉 クリア！ スコア: ' + score
        : 'ゲームオーバー… スコア: ' + score;
      document.getElementById('startBtn').textContent = 'もう一度';
      document.getElementById('startBtn').style.display = '';
    }

    function loop() {
      update();
      draw();
      if (running) animId = requestAnimationFrame(loop);
    }

    document.getElementById('startBtn').addEventListener('click', () => {
      init();
      running = true;
      document.getElementById('startBtn').style.display = 'none';
      document.getElementById('message').textContent = '';
      animId = requestAnimationFrame(loop);
    });

    document.addEventListener('keydown', e => { keys[e.key] = true; });
    document.addEventListener('keyup',   e => { keys[e.key] = false; });

    canvas.addEventListener('mousemove', e => {
      const mx = toCanvasX(e.clientX);
      paddle.x = mx - currentPaddleW() / 2;
      paddle.x = Math.max(0, Math.min(W - currentPaddleW(), paddle.x));
    });

    canvas.addEventListener('touchmove', e => {
      e.preventDefault();
      const tx = toCanvasX(e.touches[0].clientX);
      paddle.x = tx - currentPaddleW() / 2;
      paddle.x = Math.max(0, Math.min(W - currentPaddleW(), paddle.x));
    }, { passive: false });

    fitCanvas();
    init();
  </script>
</body>
</html>
